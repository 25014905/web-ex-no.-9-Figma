{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Event Registration</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#222;
}

.mobile{
    width:280px;
    height:600px;
    margin:30px auto;
    border-radius:30px;
    background:
      linear-gradient(rgba(255,255,255,0.7),rgba(255,255,255,0.7)),
      url("/static/images/bg.jpg");
    background-size:cover;
    padding:20px;
    box-shadow:0 0 10px black;
    text-align:center;
}

.logo{
    width:150px;
    margin-top:40px;
}

h2{
    margin-top:40px;
    font-size:18px;
    letter-spacing:2px;
}

input{
    width:140px;
    padding:8px;
    border:none;
    border-radius:20px;
    margin:8px;
}

label{
    font-size:13px;
    font-weight:bold;
}

button{
    background:#ff3b12;
    color:white;
    border:none;
    padding:12px 35px;
    border-radius:12px;
    margin-top:20px;
    font-weight:bold;
}

a{
    color:red;
    font-weight:bold;
    text-decoration:none;
    font-size:13px;
}
</style>
</head>

<body>

<div class="mobile">

    <img class="logo" src="{% static 'images/sec.png' %}">

    <h2>LOGIN / SIGN UP</h2>

    <form action="/events/" method="get">
        <label>EMAIL ID :</label>
        <input type="email"><br>

        <label>PASSWORD :</label>
        <input type="password"><br>

        <button type="submit">SUBMIT</button>
    </form>

    <br><br>
    <p><b>FACING TROUBLE ?</b></p>
    <a href="#">CONTACT US</a>

</div>

</body>
</html>
