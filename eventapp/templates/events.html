{% load static %}

<!DOCTYPE html>
<html>
<head>
<title>Events</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#222;
}

.mobile{
    width:280px;
    height:600px;
    margin:30px auto;
    border-radius:30px;

    background:
    linear-gradient(rgba(255,255,255,0.7),rgba(255,255,255,0.7)),
    url("{% static 'images/bg.jpg' %}");

    background-size:cover;
    padding:20px;
    box-shadow:0 0 10px black;
}

.logo{
    width:220px;
}

h2{
    text-align:center;
    margin-top:30px;
    font-size:24px;
}

ul{
    list-style:none;
    padding:0;
    margin-top:40px;
}

li{
    margin:18px 0;
    font-size:20px;
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    background:#ff4d1c;
    color:white;
    border:none;
    border-radius:15px;
    margin-top:40px;
    font-size:16px;
    font-weight:bold;
}

.contact{
    text-align:center;
    margin-top:30px;
}

a{
    color:red;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="mobile">

<center>
<img src="{% static 'images/event.png' %}" width="200px">
</center>

<h2>LIST OF EVENTS</h2>

<ul>
    <li>🏸 BADMINTON</li>
    <li>🏏 CRICKET</li>
    <li>🏐 VOLLEY BALL</li>
    <li>🏃 ATHLETICS</li>
    <li>🤾 HAND BALL</li>
    <li>💻 HACKATHON</li>
    <li>📄 PAPER PRESENTATION</li>
    <li>🛠 WORKSHOPS</li>
</ul>

<form action="/details/">
    <button type="submit">NEXT</button>
</form>

<div class="contact">
    <p>FACING TROUBLE ?</p>
    <a href="#">CONTACT US</a>
</div>

</div>

</body>
</html>
